# aquarium.cfg — ASCII Aquarium configuration
#
# Lines starting with # are comments.
# All values are optional; built-in defaults are shown.
#
# ── Timing ────────────────────────────────────────────────────────────────────

# Target frame rate (frames per second).  Range: 1–60.
fps = 12


# ── Fish ──────────────────────────────────────────────────────────────────────

# Number of fish to start with.
fish_start = 15

# Maximum fish allowed in the tank at once (+ key won't go above this).
fish_max = 30

# Fish speed range in cells-per-frame (min and max).
fish_speed_min = 0.08
fish_speed_max = 0.22

# Probability per fish per frame of emitting a bubble (0.0 – 1.0).
bubble_fish_chance = 0.015

# Probability per frame of a random floor bubble appearing (0.0 – 1.0).
bubble_floor_chance = 0.008

# Maximum simultaneous bubbles on screen.
bubble_max = 60

# ── Day / Night cycle ─────────────────────────────────────────────────────────

# Enable the slow colour shift between day (bright blue) and night (dark).
# true or false
day_night_cycle = false

# Full cycle duration in seconds (day → night → day).
day_night_period = 30

# ── Colors ────────────────────────────────────────────────────────────────────
# Named colors for scene elements.
# Valid values: black, red, green, yellow, blue, magenta, cyan, white

color_border   = white
color_seaweed  = green
color_bubble   = cyan
color_rock     = white
color_coral    = magenta
color_sand     = yellow
color_chest    = yellow
color_status_fg = black
color_status_bg = white
